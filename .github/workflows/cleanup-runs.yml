name: Cleanup old workflow runs
on:
  schedule:
    - cron: '0 0 1 * *' # Monthly on the 1st
  workflow_dispatch: # Manual trigger

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10