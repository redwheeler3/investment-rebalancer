name: Refresh Questrade Tokens

on:
  schedule:
    # Run every 6 hours (UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Refresh tokens
        run: python main.py --refresh-only

      - name: Check for token changes
        id: check_changes
        run: |
          git diff --quiet tokens/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated tokens
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/
          git commit -m "🔄 Auto-refresh Questrade tokens [skip ci]"
          git push

      - name: Alert on prolonged failure (>48h)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Count recent consecutive failures for this workflow
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'refresh_tokens.yml',
              per_page: 20,
              status: 'completed',
            });

            let consecutiveFailures = 0;
            for (const run of runs.data.workflow_runs) {
              if (run.conclusion === 'failure') {
                consecutiveFailures++;
              } else {
                break;
              }
            }

            // With 6-hour intervals, >48 hours means strictly more than 8 consecutive failures
            if (consecutiveFailures <= 8) {
              console.log(`Only ${consecutiveFailures} consecutive failure(s) (~${consecutiveFailures * 6}h). Skipping issue creation (threshold: >48h).`);
              return;
            }

            console.log(`${consecutiveFailures} consecutive failures (~${consecutiveFailures * 6}h). Creating issue.`);

            // Check for existing open issue to avoid duplicates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'token-refresh',
              state: 'open',
            });

            if (issues.data.length > 0) {
              console.log('Open token-refresh issue already exists. Skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Questrade Token Refresh Failed (>48h)',
              body: `The automatic token refresh has been failing for more than 48 hours (${consecutiveFailures} consecutive failures).\n\nPlease manually refresh your tokens:\n1. Go to https://www.questrade.com/api\n2. Generate new refresh tokens for each account\n3. Update \`tokens/jeff_token.json\` and \`tokens/eunee_token.json\`\n4. Push to the repo\n\n[Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'token-refresh']
            });
