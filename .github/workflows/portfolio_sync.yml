name: Portfolio Sync

on:
  schedule:
    # Run every 12 hours (UTC) — offset by 7 minutes to avoid on-the-hour congestion
    - cron: '7 */12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: read      # needed for listing workflow runs (failure counter)
  contents: write    # needed for git push
  issues: write      # needed for creating issues on failure

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh tokens and snapshot portfolio
        run: python main.py --refresh-only

      - name: Check for changes
        id: check_changes
        run: |
          # Check for modified tracked files OR new untracked files in data/
          TRACKED_CHANGED=false
          UNTRACKED_NEW=false
          git diff --quiet tokens/ data/ || TRACKED_CHANGED=true
          [ -n "$(git ls-files --others --exclude-standard data/)" ] && UNTRACKED_NEW=true
          if [ "$TRACKED_CHANGED" = "true" ] || [ "$UNTRACKED_NEW" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/ data/
          git commit -m "🔄 Auto-sync tokens and portfolio history [skip ci]"
          git push

      - name: Alert on prolonged failure (>48h)
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            // Count recent consecutive failures for this workflow
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'portfolio_sync.yml',
              per_page: 20,
              status: 'completed',
            });

            let consecutiveFailures = 0;
            for (const run of runs.data.workflow_runs) {
              if (run.conclusion === 'failure') {
                consecutiveFailures++;
              } else {
                break;
              }
            }

            // With 12-hour intervals, >48 hours means strictly more than 4 consecutive failures
            if (consecutiveFailures <= 4) {
              console.log(`Only ${consecutiveFailures} consecutive failure(s) (~${consecutiveFailures * 12}h). Skipping issue creation (threshold: >48h).`);
              return;
            }

            console.log(`${consecutiveFailures} consecutive failures (~${consecutiveFailures * 12}h). Creating issue.`);

            // Check for existing open issue to avoid duplicates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'token-refresh',
              state: 'open',
            });

            if (issues.data.length > 0) {
              console.log('Open token-refresh issue already exists. Skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Questrade Token Refresh Failed (>48h)',
              body: `@redwheeler3 — The automatic token refresh has been failing for more than 48 hours (${consecutiveFailures} consecutive failures).\n\nPlease manually refresh your tokens:\n1. Go to https://www.questrade.com/api\n2. Generate new refresh tokens for each account\n3. Update \`tokens/jeff_token.json\` and \`tokens/eunee_token.json\`\n4. Push to the repo\n\n[Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              assignees: ['redwheeler3'],
              labels: ['bug', 'token-refresh']
            });
