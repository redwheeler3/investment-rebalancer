name: Portfolio Sync

on:
  schedule:
    # Run at 10:00 UTC and 22:00 UTC (= 3:00 AM and 3:00 PM PDT / UTC-7)
    - cron: '0 10,22 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private state repo
        uses: actions/checkout@v5
        with:
          path: state

      - name: Checkout public code repo
        uses: actions/checkout@v5
        with:
          repository: <PUBLIC_REPO_OWNER>/<PUBLIC_REPO_NAME>
          ref: main
          path: code

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: code
        run: pip install -r requirements.txt

      - name: Sync portfolio data (refresh tokens + snapshot value)
        working-directory: code
        env:
          REBALANCER_STATE_DIR: ${{ github.workspace }}/state
        run: python main.py --sync

      - name: Check for changes
        id: check_changes
        working-directory: state
        run: |
          TRACKED_CHANGED=false
          UNTRACKED_NEW=false
          git diff --quiet tokens/ data/ || TRACKED_CHANGED=true
          [ -n "$(git ls-files --others --exclude-standard data/)" ] && UNTRACKED_NEW=true
          if [ "$TRACKED_CHANGED" = "true" ] || [ "$UNTRACKED_NEW" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        working-directory: state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/ data/
          git commit -m "🔄 Auto-sync tokens and portfolio history [skip ci]"
          git push

      - name: Alert on prolonged failure (>48h)
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'portfolio_sync.yml',
              per_page: 20,
              status: 'completed',
            });

            let consecutiveFailures = 0;
            for (const run of runs.data.workflow_runs) {
              if (run.conclusion === 'failure') {
                consecutiveFailures++;
              } else {
                break;
              }
            }

            if (consecutiveFailures <= 4) {
              console.log(`Only ${consecutiveFailures} consecutive failure(s) (~${consecutiveFailures * 12}h). Skipping issue creation (threshold: >48h).`);
              return;
            }

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'token-refresh',
              state: 'open',
            });

            if (issues.data.length > 0) {
              console.log('Open token-refresh issue already exists. Skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Questrade Token Refresh Failed (>48h)',
              body: `The automatic token refresh has been failing for more than 48 hours (${consecutiveFailures} consecutive failures).\n\nPlease manually refresh your tokens in the private state repo.\n\n[Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'token-refresh']
            });