# Placement rules for the rebalancer.
# These rules determine how trades are distributed across accounts.
# Set enabled: true/false to toggle rules.
# Add new rules here as needed — the rules engine in src/rules.py will pick them up.

rules:
  - name: existing_positions_only
    description: >
      Only buy/sell positions that already exist in a given account.
      Never introduce a new ticker into an account that doesn't already hold it.
      Prefer leaving excess cash over creating new positions.
    enabled: true

  - name: norberts_gambit
    description: >
      Flag currency conversions between CAD and USD.
      Handle DLR.TO / DLR.U.TO as transient conversion instruments:
      - Exclude from portfolio value calculations
      - If DLR.U.TO is held, recommend selling (post-journal)
      - If DLR.TO is held, recommend waiting (pre-journal)
    enabled: true

# Symbols considered transient (excluded from portfolio valuation)
transient_symbols:
  - DLR.TO
  - DLR.U.TO