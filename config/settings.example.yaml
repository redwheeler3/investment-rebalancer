# Example target allocation percentages for a generic combined portfolio.
# When tactical deployment is active, static + FX-derived equity targets
# should sum to baseline_equity_pct (the fixed portion is managed by
# tactical). Without tactical, they should sum to 100%.
# Cash targets use currency codes (CAD, USD).
#
# This file is intentionally public-safe sample data. Replace it with your own
# real settings in the private state repo's config/settings.yaml.

# Account definitions.
# - owner_name is the label shown in reports
# - token_file is the filename in your private repo's tokens/ directory
# - account_type_display_overrides is optional and lets you relabel certain
#   Questrade clientAccountType values, such as mapping Corporation to a
#   holding-company display name.
accounts:
  - owner_name: Primary
    token_file: primary_token.json
  - owner_name: Secondary
    token_file: secondary_token.json
    account_type_display_overrides:
      Corporation: HoldingCo

targets:
  CAD: 0.0
  USD: 0.0
  VCN.TO: 20.0
  VUN.TO: 25.0
  XEF.TO: 15.0

# FX-derived targets.
# Each rule dynamically splits an allocation between a USD ETF and a
# CAD-hedged ETF based on the current USD/CAD exchange rate.
# Remove a rule (or the entire section) to disable it.
fx_target_rules:
  usd_equity_split:
    usd_symbol: IVV
    cad_symbol: XSP.TO
    total_target_pct: 20.0
    min_usd_to_cad_rate: 1.0
    max_usd_to_cad_rate: 1.5
    target_rounding_step: 1

# Transient symbols — temporarily excluded from rebalancing.
transient_symbols:
  - DLR.TO
  - DLR.U.TO

# Trading fee for Norbert's Gambit: $9.99 commission + 5% GST.
norberts_gambit_fee_cad: 10.49

# Tactical defensive deployment.
# Dynamically shifts the fixed/equity allocation based on portfolio drawdown
# from a Reference High. Deploys fixed-income assets into equities during
# drawdowns, and rebuilds the fixed position on recovery.
#
# fixed_composition percentages should sum to 100 — they define how the fixed
# allocation is split across instruments regardless of the total fixed %.
#
# deploy_thresholds trigger moving INTO equities (on the way down).
# recovery_thresholds trigger rebuilding fixed position (on the way up).
# Both use drawdown_pct relative to the Reference High.
tactical_deployment:
  baseline_equity_pct: 80.0
  fixed_composition:
    ZMMK.TO: 50.0    # Money market
    XSH.TO: 25.0     # Canadian short-term corporate bonds
    XIGS.TO: 25.0    # US short-term corporate bonds
  deploy_thresholds:
    - { drawdown_pct: -10.0, fixed_pct: 15.0 }
    - { drawdown_pct: -20.0, fixed_pct: 10.0 }
    - { drawdown_pct: -30.0, fixed_pct: 5.0 }
  recovery_thresholds:
    - { drawdown_pct: -15.0, fixed_pct: 10.0 }
    - { drawdown_pct: -5.0, fixed_pct: 15.0 }
    - { drawdown_pct: 5.0, fixed_pct: 20.0 }

# Only generate trades for symbols whose absolute drift is at least this %.
drift_trade_threshold_pct: 0.5
